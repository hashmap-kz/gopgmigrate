manifest:
  table: schema_migrations

migrations:
  # ---- rel-0.0.1 ----

  - id: rel-0.0.1.schemas
    files:
      - sql/rel-0.0.1/schemas/schemas.sql
    description: |
      Create application schemas (app, audit, lookup).
      Schemas must exist before any table is created.

  - id: rel-0.0.1.lookup-tables
    files:
      - sql/rel-0.0.1/tables/lookup_tables.sql
      - sql/rel-0.0.1/tables/lookup_seed.sql
    mode: atomic
    description: |
      Create lookup/reference tables and populate them with seed data in one
      transaction. Rolling back the DDL without the seed would leave the schema
      in an inconsistent state, so atomic mode is required here.

  - id: rel-0.0.1.core-tables
    files:
      - sql/rel-0.0.1/tables/users.sql
      - sql/rel-0.0.1/tables/sessions.sql
      - sql/rel-0.0.1/tables/audit_log.sql
    description: |
      Core domain tables: users, sessions, and the audit log.
      Each file is applied in its own transaction so a failure in sessions
      does not roll back the already-committed users table.

  - id: rel-0.0.1.concurrent-indexes
    files:
      - sql/rel-0.0.1/indexes/concurrent_indexes.sql
    mode: no-tx
    description: |
      Build indexes concurrently to avoid locking the tables during deployment.
      CREATE INDEX CONCURRENTLY cannot run inside a transaction, so no-tx mode
      is mandatory. If this step fails mid-run, re-running is safe because
      concurrent index builds are restartable.

  - id: rel-0.0.1.views
    files:
      - sql/rel-0.0.1/views/v_user_summary.sql
      - sql/rel-0.0.1/views/v_recent_changes.sql
    mode: repeatable
    description: |
      Reporting views refreshed automatically whenever their SQL changes.
      Using repeatable mode means developers can iterate on view definitions
      without manual history cleanup - the checksum diff triggers a re-apply.
