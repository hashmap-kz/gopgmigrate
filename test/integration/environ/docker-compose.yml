services:
  postgres:
    image: postgres:17.9-alpine3.23
    environment:
      POSTGRES_USER:     test
      POSTGRES_PASSWORD: test
      POSTGRES_DB:       test
    ports:
      - "15432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 2s
      timeout:  5s
      retries:  10
